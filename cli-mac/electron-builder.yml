appId: com.forge.agent
productName: Forge
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - package.json
  - '!node_modules/@anthropic-ai/claude-agent-sdk-*/**'
asar: true
compression: maximum
electronLanguages:
  - en-US
  - zh-CN
  - zh-TW
mac:
  icon: build/icon.icns
  category: public.app-category.developer-tools
  target: dmg
  artifactName: ${productName}-${version}-external-claude-mac-${arch}.${ext}

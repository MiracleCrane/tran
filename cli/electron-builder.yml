appId: com.tran.agent
productName: Tran
directories:
  buildResources: build
  output: release
icon: build/icon.ico
files:
  - out/**/*
  - package.json
extraResources:
  - from: build/desktopShortcutIcon.ico
    to: desktopShortcutIcon.ico
asar: true
compression: maximum
electronLanguages:
  - en-US
  - zh-CN
  - zh-TW
win:
  icon: build/icon.ico
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}
nsis:
  include: build/installer.nsh
  installerIcon: build/installerIcon.ico
  installerHeaderIcon: build/installerHeaderIcon.ico
  uninstallerIcon: build/uninstallerIcon.ico
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
